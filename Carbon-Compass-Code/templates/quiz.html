<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Calculate Your Footprint | Carbon Compass</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&family=Cormorant+Garamond:wght@500;600;700&family=Instrument+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>

<main>
    <header class="quiz-header">
        <a
            class="quiz-logo"
            href="{{ url_for('home') }}"
        >
            Carbon Compass
        </a>

        <div class="quiz-introduction">
            <div
                class="progress-bar"
                aria-label="Assessment progress"
            >
                <div
                    class="progress-fill"
                    id="progressFill"
                ></div>
            </div>

            <p
                class="step-text"
                id="stepText"
            >
                Step 1 of 6
            </p>
        </div>
    </header>


    <form
        id="carbonForm"
        method="post"
        action="{{ url_for('quiz') }}"
        autocomplete="off"
    >

        <!-- HOUSING -->

        <section class="panel quiz-step active">

            <div class="quiz-section-heading">
                <h2>Housing</h2>
            </div>


            <label for="country">
                What country do you live in?
            </label>

            <select
                id="country"
                name="country"
                required
            >
                <option
                    value=""
                    selected
                    disabled
                >
                    Select your country
                </option>

                {% for country in countries %}
                    <option value="{{ country }}">
                        {{ country }}
                    </option>
                {% endfor %}
            </select>


            <label for="state">
                What state or province do you live in?
            </label>

            <input
                type="text"
                id="state"
                name="state"
                placeholder="Type your state or province"
                autocomplete="off"
            >


            <label for="household_size">
                How many people live in your household?
            </label>

            <input
                type="number"
                id="household_size"
                name="household_size"
                min="1"
                placeholder="Enter a number"
                required
            >


            <label for="home_type">
                What type of home do you live in?
            </label>

            <select
                id="home_type"
                name="home_type"
                required
            >
                <option
                    value=""
                    selected
                    disabled
                >
                    Select your home type
                </option>

                <option value="Apartment">Apartment</option>
                <option value="Townhouse">Townhouse</option>
                <option value="Detached house">Detached house</option>
                <option value="Dormitory">Dormitory</option>
                <option value="Other">Other</option>
            </select>


            <label for="home_size">
                Approximately how large is your home?
            </label>

            <select
                id="home_size"
                name="home_size"
                required
            >
                <option
                    value=""
                    selected
                    disabled
                >
                    Select a size
                </option>

                <option value="Small">Small</option>
                <option value="Medium">Medium</option>
                <option value="Large">Large</option>
                <option value="Very large">Very large</option>
            </select>


            <label>
                Which of these does your home use?
            </label>

            <div class="checkbox-list">

                <label>
                    <input
                        type="checkbox"
                        name="home_systems"
                        value="Electricity"
                    >
                    <span>Electricity</span>
                </label>

                <label>
                    <input
                        type="checkbox"
                        name="home_systems"
                        value="Heating"
                    >
                    <span>Heating</span>
                </label>

                <label>
                    <input
                        type="checkbox"
                        name="home_systems"
                        value="Air conditioning"
                    >
                    <span>Air conditioning</span>
                </label>

                <label>
                    <input
                        type="checkbox"
                        name="home_systems"
                        value="Solar panels"
                    >
                    <span>Solar panels</span>

                </label>
            </div>

        </section>


        <!-- TRANSPORTATION -->

        <section class="panel quiz-step">

            <div class="quiz-section-heading">
                <h2>Transportation</h2>
            </div>


            <label>
                Which motor vehicles do you regularly use?
            </label>

            <div class="checkbox-list">

                <label>
                    <input
                        type="checkbox"
                        name="vehicle_types"
                        value="Gasoline car"
                    >
                    <span>Gasoline car</span>
                </label>

                <label>
                    <input
                        type="checkbox"
                        name="vehicle_types"
                        value="Hybrid vehicle"
                    >
                    <span>Hybrid vehicle</span>
                </label>

                <label>
                    <input
                        type="checkbox"
                        name="vehicle_types"
                        value="Electric car"
                    >
                    <span>Electric car</span>
                </label>

                <label>
                    <input
                        type="checkbox"
                        name="vehicle_types"
                        value="Motorcycle"
                    >
                    <span>Motorcycle</span>
                </label>

                <label>
                    <input
                        type="checkbox"
                        name="vehicle_types"
                        value="None"
                        checked
                    >
                    <span>None</span>
                </label>

            </div>


            <label for="distanceUnit">
                Which distance unit do you use?
            </label>

            <select
                id="distanceUnit"
                name="distance_unit"
                required
            >
                <option
                    value=""
                    selected
                    disabled
                >
                    Select a unit
                </option>

                <option value="Kilometers">Kilometers</option>
                <option value="Miles">Miles</option>
            </select>


            <div
                id="vehicle-questions"
                class="hidden"
            >

                <label
                    id="weeklyVehicleDistanceLabel"
                    for="weeklyVehicleDistanceSlider"
                >
                    Approximately how far do you drive each week?
                </label>

                <div class="slider-row">

                    <input
                        type="range"
                        id="weeklyVehicleDistanceSlider"
                        min="0"
                        max="1000"
                        step="10"
                        value="0"
                    >

                    <span id="weeklyVehicleDistanceValue">
                        0
                    </span>

                </div>

                <input
                    type="hidden"
                    id="weeklyVehicleDistance"
                    name="weekly_vehicle_distance"
                    value="0"
                >


                <label for="carpool">
                    How often do you carpool?
                </label>

                <select
                    id="carpool"
                    name="carpool"
                >
                    <option value="Never">Never</option>
                    <option value="Rarely">Rarely</option>
                    <option value="Sometimes">Sometimes</option>
                    <option value="Often">Often</option>
                    <option value="Always">Always</option>
                </select>

            </div>


            <label for="commute">
                How do you usually commute?
            </label>

            <select
                id="commute"
                name="commute"
                required
            >
                <option
                    value=""
                    selected
                    disabled
                >
                    Select your usual commute
                </option>

                <option value="Car">Car</option>
                <option value="Bus">Bus</option>
                <option value="Train">Train</option>
                <option value="Bicycle">Bicycle</option>
                <option value="Walk">Walk</option>
                <option value="Work from home">Work from home</option>
                <option value="Other">Other</option>
            </select>


            <label
                id="commuteLengthLabel"
                for="commuteLengthSlider"
            >
                Approximately how far is your one-way commute?
            </label>

            <div class="slider-row">

                <input
                    type="range"
                    id="commuteLengthSlider"
                    min="0"
                    max="100"
                    step="1"
                    value="0"
                >

                <span id="commuteLengthValue">
                    0
                </span>

            </div>

            <input
                type="hidden"
                id="commuteLength"
                name="commute_length"
                value="0"
            >


            <label for="commuteFrequencySlider">
                How many days per week do you commute?
            </label>

            <div class="slider-row">

                <input
                    type="range"
                    id="commuteFrequencySlider"
                    min="0"
                    max="7"
                    step="1"
                    value="0"
                >

                <span id="commuteFrequencyValue">
                    0
                </span>

            </div>

            <input
                type="hidden"
                id="commuteFrequency"
                name="commute_frequency"
                value="0"
            >


            <label for="domestic_flights">
                How many domestic flights do you take each year on average?
            </label>

            <input
                type="number"
                id="domestic_flights"
                name="domestic_flights"
                min="0"
                placeholder="0"
            >


            <label for="international_flights">
                How many international flights do you take each year on average?
            </label>

            <input
                type="number"
                id="international_flights"
                name="international_flights"
                min="0"
                placeholder="0"
            >

        </section>


        <!-- FOOD -->

        <section class="panel quiz-step">

            <div class="quiz-section-heading">
                <h2>Food</h2>
            </div>


            <label for="dietSelect">
                Which best describes your diet?
            </label>

            <select
                id="dietSelect"
                name="diet"
                required
            >
                <option
                    value=""
                    selected
                    disabled
                >
                    Select your diet
                </option>

                <option value="Vegan">Vegan</option>
                <option value="Vegetarian">Vegetarian</option>
                <option value="Pescetarian">Pescetarian</option>
                <option value="Omnivore">Omnivore</option>
                <option value="Heavy meat-eater">Heavy meat-eater</option>
            </select>


            <div
                id="beef-lamb-question"
                class="hidden"
            >

                <label for="beef_lamb_frequency">
                    How often do you eat beef or lamb?
                </label>

                <select
                    id="beef_lamb_frequency"
                    name="beef_lamb_frequency"
                >
                    <option value="Never">Never</option>
                    <option value="Rarely">Rarely</option>
                    <option value="Weekly">Weekly</option>
                    <option value="Several times per week">
                        Several times per week
                    </option>
                    <option value="Daily">Daily</option>
                </select>

            </div>


            <label for="dairy_frequency">
                How often do you consume dairy?
            </label>

            <select
                id="dairy_frequency"
                name="dairy_frequency"
                required
            >
                <option
                    value=""
                    selected
                    disabled
                >
                    Select a frequency
                </option>

                <option value="Never">Never</option>
                <option value="Rarely">Rarely</option>
                <option value="Weekly">Weekly</option>
                <option value="Several times per week">
                    Several times per week
                </option>
                <option value="Daily">Daily</option>
            </select>


            <label for="food_waste">
                How much food do you typically throw away?
            </label>

            <select
                id="food_waste"
                name="food_waste"
                required
            >
                <option
                    value=""
                    selected
                    disabled
                >
                    Select an amount
                </option>

                <option value="None">None</option>
                <option value="A little">A little</option>
                <option value="Some">Some</option>
                <option value="A lot">A lot</option>
            </select>

        </section>


        <!-- WASTE -->

        <section class="panel quiz-step">

            <div class="quiz-section-heading">
                <h2>Waste</h2>
            </div>


            <label for="recycles">
                Do you recycle?
            </label>

            <select
                id="recycles"
                name="recycles"
                required
            >
                <option
                    value=""
                    selected
                    disabled
                >
                    Select an answer
                </option>

                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>


            <label for="composts">
                Do you compost?
            </label>

            <select
                id="composts"
                name="composts"
                required
            >
                <option
                    value=""
                    selected
                    disabled
                >
                    Select an answer
                </option>

                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>


            <label for="trash_bags_per_week">
                How many trash bags does your household fill per week?
            </label>

            <input
                type="number"
                id="trash_bags_per_week"
                name="trash_bags_per_week"
                min="0"
                placeholder="Enter a number"
                required
            >

        </section>


        <!-- DIGITAL -->

        <section class="panel quiz-step">

            <div class="quiz-section-heading">
                <h2>Digital</h2>
            </div>


            <label for="streamingSlider">
                How many hours per day do you stream video or music?
            </label>

            <div class="slider-row">

                <input
                    type="range"
                    id="streamingSlider"
                    min="0"
                    max="12"
                    step="0.5"
                    value="0"
                >

                <span id="streamingValue">
                    0
                </span>

            </div>

            <input
                type="hidden"
                id="streamingHours"
                name="streaming_hours_per_day"
                value="0"
            >


            <label for="ai_usage">
                How often do you use AI tools?
            </label>

            <select
                id="ai_usage"
                name="ai_usage"
                required
            >
                <option
                    value=""
                    selected
                    disabled
                >
                    Select a frequency
                </option>

                <option value="Never">Never</option>
                <option value="Rarely">Rarely</option>
                <option value="Weekly">Weekly</option>
                <option value="Daily">Daily</option>
            </select>


            <label for="videoCallSlider">
                How many hours do you spend on video calls each week?
            </label>

            <div class="slider-row">

                <input
                    type="range"
                    id="videoCallSlider"
                    min="0"
                    max="40"
                    step="0.5"
                    value="0"
                >

                <span id="videoCallValue">
                    0
                </span>

            </div>

            <input
                type="hidden"
                id="videoCallHours"
                name="video_call_hours_per_week"
                value="0"
            >

        </section>


        <!-- SHOPPING -->

        <section class="panel quiz-step">

            <div class="quiz-section-heading">
                <h2>Shopping</h2>
            </div>

            <label for="new_clothing_frequency">
                How often do you buy new clothing?
            </label>

            <select
                id="new_clothing_frequency"
                name="new_clothing_frequency"
                required
            >
                <option
                    value=""
                    selected
                    disabled
                >
                    Select a frequency
                </option>

                <option value="Rarely">Rarely</option>
                <option value="Sometimes">Sometimes</option>
                <option value="Often">Often</option>
                <option value="Frequently">Frequently</option>
            </select>


            <label for="new_electronics_frequency">
                How often do you buy new electronics?
            </label>

            <select
                id="new_electronics_frequency"
                name="new_electronics_frequency"
                required
            >
                <option
                    value=""
                    selected
                    disabled
                >
                    Select a frequency
                </option>

                <option value="Rarely">Rarely</option>
                <option value="Sometimes">Sometimes</option>
                <option value="Often">Often</option>
                <option value="Frequently">Frequently</option>
            </select>

        </section>


        <!-- NAVIGATION -->

        <div class="nav-row">

            <button
                class="button secondary"
                type="button"
                id="prevBtn"
            >
                Previous
            </button>

            <button
                class="button"
                type="button"
                id="nextBtn"
            >
                Next
            </button>

            <button
                class="button"
                type="submit"
                id="submitBtn"
            >
                Calculate My Footprint
            </button>

        </div>

    </form>

</main>


<script
    src="{{ url_for('static', filename='script.js') }}"
></script>

</body>

</html>
